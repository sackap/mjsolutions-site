<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explain This For Me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- HERO -->
    <section class="hero">
      <h1>Confused by a document?</h1>
      
      <p class="subheadline">
        Understand it in 30 seconds. Clear explanation, risks, and what to do next.
      </p>

      <a href="https://text-explainer.replit.app/" target="_blank" class="button">
        Try it now
      </a>

      <p class="note">
        Free for a limited time • Future pricing: £1 per explanation
      </p>
    </section>

    <!-- SUPPORTING (compact) -->
    <section class="support">
      <p>Used for:</p>
      <div class="tags">
        <span>Bank fees</span>
        <span>Contracts</span>
        <span>Insurance emails</span>
        <span>Medical letters</span>
      </div>
    </section>

  </div>

</body>
</html>
